name: Java CI with Maven
on:
  push:
    branches: [ "thuvh/main" ]
  pull_request:
    branches: [ "thuvh/main" ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        architecture: x64
        cache: maven
    - name: Build with Maven
      run: |
        ./run_maven.sh --batch-mode --update-snapshots verify
        ./run_maven.sh package
