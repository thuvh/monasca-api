- job:
    name: monasca-tempest-base
    parent: devstack-tempest
    timeout: 7800
    required-projects:
      - openstack-infra/devstack-gate
      - openstack/monasca-agent
      - openstack/monasca-api
      - openstack/monasca-common
      - openstack/monasca-grafana-datasource
      - openstack/monasca-notification
      - openstack/monasca-persister
      - openstack/monasca-statsd
      - openstack/monasca-thresh
      - openstack/monasca-ui
      - openstack/python-monascaclient
      - openstack/tempest
      - openstack/monasca-tempest-plugin
    vars:
      tempest_test_regex: monasca_tempest_tests.tests.api
      devstack_localrc:
        MONASCA_API_IMPLEMENTATION_LANG: python
        MONASCA_PERSISTER_IMPLEMENTATION_LANG: python
        MONASCA_METRICS_DB: mysql
        TEMPEST_PLUGINS: /opt/stack/monasca-tempest-plugin
      devstack_plugins:
        monasca-api: git://git.openstack.org/openstack/monasca-api.git
        monasca-tempest-plugin: git://git.openstack.org/openstack/monasca-tempest-plugin.git

    irrelevant-files:
      - ^.*\.rst$
      - ^.*\.md$
      - ^doc/.*$
      - ^releasenotes/.*$

- job:
    name: monasca-tempest-python-influxdb
    parent: monasca-tempest-base
    vars:
      devstack_localrc:
        MONASCA_API_IMPLEMENTATION_LANG: python
        MONASCA_PERSISTER_IMPLEMENTATION_LANG: python
        MONASCA_METRICS_DB: influxdb
        TEMPEST_PLUGINS: /opt/stack/monasca-tempest-plugin
      devstack_plugins:
        monasca-api: git://git.openstack.org/openstack/monasca-api.git
        monasca-tempest-plugin: git://git.openstack.org/openstack/monasca-tempest-plugin.git

- job:
    name: monasca-tempest-java-influxdb
    parent: monasca-tempest-base
    vars:
      tsdb: influxdb
      api_lang: java
      persister_lang: java

- job:
    name: monasca-tempest-python-cassandra
    parent: monasca-tempest-base
    vars:
      tsdb: cassandra
      api_lang: python
      persister_lang: python

- job:
    name: monasca-tempest-java-cassandra
    parent: monasca-tempest-base
    vars:
      tsdb: cassandra
      api_lang: python
      persister_lang: java

- project:
    templates:
      - check-requirements
      - openstack-cover-jobs
      - openstack-lower-constraints-jobs
      - openstack-python-jobs
      - openstack-python35-jobs
      - openstack-python36-jobs
      - publish-openstack-docs-pti
      - release-notes-jobs-python3
    check:
      jobs:
        - monasca-tempest-python-influxdb
    gate:
      queue: monasca
      jobs:
        - monasca-tempest-python-influxdb
    post:
      jobs:
        - legacy-monasca-api-localrepo-upload
