- job:
    name: monasca-tempest-base
    parent: devstack
    timeout: 9000
    description: |
      Base job for Monasca-api project
    pre-run: gate/base/prepare-workspace
    run: gate/tempest-base
    post-run: gate/post/upload-logs
    required-projects:
       - name: openstack/monasca-api
       - name: openstack/monasca-persister
       - name: openstack/monasca-common
       - name: openstack/monasca-agent
       - name: openstack/monasca-notification
       - name: openstack/monasca-thresh
       - name: openstack/monasca-statsd
       - name: openstack/python-monascaclient
       - name: openstack/monasca-grafana-datasource
       - name: openstack/monasca-ui
    irrelevant-files:
      - ^.*\.rst$
      - ^doc/.*$
      - ^docs/.*$
      - ^releasenotes/.*$
      - ^api-guide/.*$
      - ^api-ref/.*$
    vars:
      horizon: 0
      neutron: 1
      tempest: 0


- job:
    name: monasca-tempest-python-postgres
    parent: monasca-tempest-base
    vars:
      lang: python
      backend: postgresql

