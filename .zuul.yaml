- job:
    name: monasca-tempest-base
    parent: legacy-dsvm-base
    run: playbooks/legacy/monasca-tempest-base/run.yaml
    post-run: playbooks/legacy/monasca-tempest-base/post.yaml
    timeout: 7800
    required-projects:
      - openstack-infra/devstack-gate
      - openstack/monasca-agent
      - openstack/monasca-api
      - openstack/monasca-common
      - openstack/monasca-grafana-datasource
      - openstack/monasca-notification
      - openstack/monasca-persister
      - openstack/monasca-statsd
      - openstack/monasca-thresh
      - openstack/monasca-ui
      - openstack/python-monascaclient
      - openstack/tempest
      - openstack/monasca-tempest-plugin
    vars:
      database: mysql

- job:
    name: monasca-tempest-python-influxdb
    parent: monasca-tempest-base
    vars:
      tsdb: influxdb
      api_lang: python
      persister_lang: python

- job:
    name: monasca-tempest-java-influxdb
    parent: monasca-tempest-base
    vars:
      tsdb: influxdb
      api_lang: java
      persister_lang: java

- job:
    name: monasca-tempest-python-cassandra
    parent: monasca-tempest-base
    vars:
      tsdb: cassandra
      api_lang: python
      persister_lang: python

- job:
    name: monasca-tempest-java-cassandra
    parent: monasca-tempest-base
    vars:
      tsdb: cassandra
      api_lang: python
      persister_lang: java

- job:
    name: publish-monasca-sphinx-docs
    parent: publish-openstack-sphinx-docs-base
    description: |
      Publish the results of the build-openstack-sphinx-docs job to
      https://docs.openstack.org/monasca.

      Publishes depending on branch to latest/ (for master), or the
      basename of the branch like pike (for stable/pike).
    post-run:
      - playbooks/sphinx/post.yaml
    vars:
      afs_subpath: "/monasca"

- project:
    check:
      jobs:
        - monasca-tempest-python-influxdb
        - monasca-tempest-java-influxdb
        - monasca-tempest-python-cassandra
        - monasca-tempest-java-cassandra
        - openstack-tox-lower-constraints
    gate:
      jobs:
        - monasca-tempest-python-influxdb
        - monasca-tempest-java-influxdb
        - monasca-tempest-python-cassandra
        - monasca-tempest-java-cassandra
        - openstack-tox-lower-constraints
    post:
      jobs:
        - publish-monasca-sphinx-docs:
            branches: ^(?!stable/ocata).*$
