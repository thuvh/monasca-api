- job:
    name: monasca-tempest-base
    parent: legacy-dsvm-base
    timeout: 900
    nodeset: legacy-ubuntu-xenial
    description: Base job for Monasca-api project
    run: playbooks/monasca-tempest-base
    post-run: playbooks/post/upload-logs
    required-projects:
       - openstack/monasca-api
       - openstack/monasca-persister
       - openstack/monasca-common
       - openstack/monasca-agent
       - openstack/monasca-notification
       - openstack/monasca-thresh
       - openstack/monasca-statsd
       - openstack/python-monascaclient
       - openstack/monasca-grafana-datasource
       - openstack/monasca-ui
       - openstack-infra/devstack-gate
       - openstack/tempest
    irrelevant-files:
      - ^.*\.rst$
      - ^doc/.*$
      - ^docs/.*$
      - ^releasenotes/.*$
      - ^api-guide/.*$
      - ^api-ref/.*$
    vars:
      tempest: 1
      horizon: 0
      monasca-notification: 1
      monasca-persister: 0


- job:
    name: tempest-dsvm-monasca-python-mysql-full
    parent: legacy-dsvm-base
    run: playbooks/legacy/tempest-dsvm-monasca-python-mysql-full/run
    post-run: playbooks/legacy/tempest-dsvm-monasca-python-mysql-full/post
    timeout: 7800
    required-projects:
      - openstack-infra/devstack-gate
      - openstack/monasca-agent
      - openstack/monasca-api
      - openstack/monasca-common
      - openstack/monasca-grafana-datasource
      - openstack/monasca-notification
      - openstack/monasca-persister
      - openstack/monasca-statsd
      - openstack/monasca-thresh
      - openstack/monasca-ui
      - openstack/python-monascaclient
      - openstack/tempest


- job:
    name: monasca-tempest-python-mysql
    parent: monasca-tempest-base
    branches: ^(?!stable/newton).*$
    voting: false
    timeout: 2400
    vars:
      lang: python
      backend: mysql


- project:
    name: openstack/monasca-api
    check:
      jobs:
        - tempest-dsvm-monasca-python-mysql-full
    gate:
      jobs:
        - tempest-dsvm-monasca-python-mysql-full

